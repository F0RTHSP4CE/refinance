services:
  api:
    volumes:
      - ./api:/opt/api
    command: --reload
    env_file:
      - secrets.dev.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  ui:
    volumes:
      - ./ui:/opt/ui
    command: --reload
    env_file:
      - secrets.dev.env
    depends_on:
      - api
    ports:
      - "9000:9000"

  ui-new:
    build:
      target: dev
    # The bind mount hides image-baked node_modules, so the entrypoint restores
    # dependencies into the named volume and refreshes them on lockfile changes.
    command: ["sh", "/opt/ui-new/docker/dev-entrypoint.sh"]
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      - ./ui-new:/opt/ui-new
      - ui-new-node_modules:/opt/ui-new/node_modules
    ports:
      - "5173:5173"

  db:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - db-dev-data:/var/lib/postgresql/data

volumes:
  db-dev-data:
  ui-new-node_modules:
