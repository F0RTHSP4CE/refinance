services:
  api:
    volumes:
      - ./api:/opt/api
    command: --reload
    env_file:
      - secrets.dev.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  ui:
    volumes:
      - ./ui:/opt/ui
    command: --reload
    env_file:
      - secrets.dev.env
    depends_on:
      - api
    ports:
      - "9000:9000"

  ui-new:
    build:
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      - ./ui-new:/opt/ui-new
      - /opt/ui-new/node_modules
    ports:
      - "5173:5173"

  db:
    volumes:
      - db-dev-data:/var/lib/postgresql/data

volumes:
  db-dev-data:
